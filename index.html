<html> 
<head> 
	<title> Downdraft </title>
	<link rel="shortcut icon" href="tornado.png" type="image/x-icon" />
	<link rel="stylesheet" href="style.css"> 
	<link href="https://cdn.jsdelivr.net/npm/@sweetalert2/theme-dark@4/dark.css" rel="stylesheet">
	<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"> </script>
</head>
<body> 

<div class="initwait center"> 
	<div class="inittext text center"> downdraft </div>
	<div class="initlogo"> </div>
</div>

<div class="content" style="display: none"> 
<div class="version text"> Alpha 0.1 </div>
<div class="track" id="track">⬛⬛⬛</div>
<div id="riddle" class="Riddle"> To lift or haul... what am I? </div>
<div> <input placeholder="Riddle me this" type="text"class="inputfield"> </input> </div> 
<button type="submit" class="guessbutton"> Guess </button> 
</div> 



<audio id="foghorn" type="audio/mp3" src="foghorn.mp3"> </audio>
<audio id="hood" type="audio/mp3" src="hoodclassic.mp3"> </audio>
<audio id="right" type="audio/mp3" src="thatsit.mp3"> </audio>
<audio id="slip" type="audio/mp3" src="slip.mp3"> </audio>

<script>
	let answer = ["heave", "Heave"];
	let submission = document.querySelector(".inputfield").value;
	let foghorn = document.getElementById("foghorn"); 
	let slip = document.getElementById("slip"); 
	let guess = 0;  
	let word = 0; 

// Define a class for the main page
class main {
    // The constructor takes the elements to animate as parameters
    constructor(initText, initLogo, initWait, content, version) {
        this.initText = initText;
        this.initLogo = initLogo;
        this.initWait = initWait;
		this.content = content;
		this.version = version; 
    }

    // This method runs before the page is fully loaded
    preinit() {
        // Animate the downdraft initializing text to the right
        this.initText.animate({right: "0%"}, 500);

        // Fade in the the downdraft logo and allow for more animations for the class
        this.initLogo.fadeIn({queue: false}, 500);

        // Animate the logo element to the center of the initializing container
        this.initLogo.animate({top: "0%"}, 500);

        // Randomly picks a message from an array 
        const message = ["Welcome", "What's Up", "Bonjour", "Hey there!", "Hello World", "Mrs. Howell 💀"]; 
        const messagepicker = (Math.floor(Math.random() * message.length)); 

        // Takes the radom message and makes it the document title
        document.title = message[messagepicker]; 
    }

    // This method runs after the page is fully loaded
    init() {
        this.initWait.fadeOut(500);
        setTimeout(() => {this.initWait.remove();}, 500);  
        console.log("Initialization Completed");
		setTimeout(()=>{this.content.fadeIn(4000); this.version.fadeOut(10000)},1000);
    }

	check() { 
		submission = document.querySelector(".inputfield").value;
		let riddle = document.getElementById("riddle"); 
			if (answer.includes(submission) && guess<=3) {
				slip.play();
				word = word + 1; 
				Swal.fire({
  				title: 'Correct!',
  				icon: 'success'
				});
				guess = 0; 
				document.querySelector(".inputfield").value = "";
				document.getElementById("track").innerHTML = "⬛⬛⬛";
				if (word === 1) {
					answer = ["cunning", "Cunning"];
					riddle.innerHTML = "I would describe you as this word because you would be clever if you figured out who I am, what am I?"; 
				}
				if (word === 2) {
					answer = ["incredulous", "Incredulous"];
					riddle.innerHTML = "My freind has really been acting x latley he never believes me 😭 what am I?"
				}
				if (word === 3) {
					answer = ["bleakly", "Bleakly", "bleak", "Bleak"];
					riddle.innerHTML = "There is no hope that you will solve this riddle, one might even describe this situation as gloomy what am I?"; 
				}
				if (word === 4) {
					answer = ["haste", "Haste", "hastily", "Hastily"];
					riddle.innerHTML = "To be done with urgency what am I?"; 
				}
				if (word === 5) {
					answer = ["gallantly", "Gallantly", "gallant", "Gallant"];
					riddle.innerHTML = "I've been so brave latley one may even describe me as acting this word, what am I?"; 
				}
				if (word === 6) {
					answer = ["scowl", "Scowl"];
					riddle.innerHTML = "My bozo aunt has really been frowning down at me and x at me for NO REASON! What am I?"; 
				}
				if (word === 7) {
					answer = ["wince", "Wince"];
					riddle.innerHTML = "I flinch from pain or fear what am I?"; 
				}
				if (word === 8) {
					answer = ["stocky", "Stocky"];
					riddle.innerHTML = "I'm used to describe someone who is broadly and strongly built what am I?"; 
				}
				if (word === 9) {
					answer = ["aloofness", "Aloofness"];
					riddle.innerHTML = "You seem to have a lot of x to this riddle, one might even describe you as unintrested... What am I?"; 
				}
				if (word === 10) {
					answer = ["ornery", "Ornery"];
					riddle.innerHTML ="You probably got the last one wrong somebody your mood as grumpy or this word... What am I?";
				}
				if (word === 11) {
					answer = ["gingerly", "Gingerly"];
					riddle.innerHTML = "I'm do something in a careful manner what am I?"; 
				}
				if (word === 12) {
					answer = ["roguishly", "Roguishly"];
					riddle.innerHTML = "In a devious manner; quite mischievous latley if you will what am I?"; 
				}
				if (word === 13) {
					answer = ["scatterbrained", "Scatterbrained", "scatterbrain", "scatterbrain"];
					riddle.innerHTML = "I'm someone who is dumb or incapalbe of thinking what am I?"; 
				}
				if (word === 14) {
					answer = ["unfathomable", "Unfathomable"];
					riddle.innerHTML = "It is unfathomable that you are going to guess who I am, what am I?"; 
				}
				if (word === 15) {
					let hood = document.getElementById("hood"); 
					let right = document.getElementById("right"); 
					setTimeout(()=>{location.reload();}, 10000);
					hood.play();
					right.play(); 
					Swal.fire({
  					title: "Congrats you solved all 15 riddles and you've got nothing to show for it because this session will close in a few seconds💀",
  					icon: 'success'
				});
				}
			}
			else {
				if (guess<3) {
				foghorn.play(); 
				Swal.fire({
  				title: 'Womp Womp you got it wrong💀😭',
  				icon: 'error'
				})
				if (guess === 2) {
				guess = guess + 1; 
				document.getElementById("track").innerHTML = "🟥🟥🟥"
				}
				if (guess === 1) {
				guess = guess + 1; 
				document.getElementById("track").innerHTML = "🟥🟥⬛"
				}
				if (guess === 0) {
				guess = guess + 1; 
				document.getElementById("track").innerHTML = "🟥⬛⬛"
				}	 
				}
				else {
				Swal.fire({
  				title: 'You Lose! Answer: ' + answer + ' This session will close automatically',
  				icon: 'error'
				});
				setTimeout(() => {location.reload();}, 5000);
				}
		}
		}
	}

// Create an instance of the downdraft page class with the elements to animate
let downdraftPage = new main($(".inittext"), $(".initlogo"), $(".initwait"), $(".content"), $(".version"));

// Call the preinit method before the page is fully loaded
downdraftPage.preinit();

// Call the init method after the page is fully loaded
$(document).ready(() => {
    downdraftPage.init();
});

$(".guessbutton").click(function() {
  // this refers to the element with class guessbutton that was clicked
  downdraftPage.check(this);
});
</script> 

</body>
</html>
